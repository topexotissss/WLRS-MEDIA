<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WLRS MEDIA</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: Arial, sans-serif;
        }
        
        .video-container {
            position: relative;
            width: 100%;
            max-width: 450px;  /* Lebar maks untuk 9:16 */
            aspect-ratio: 9/16; /* Portrait mode */
            overflow: hidden;
            border-radius: 8px;
            margin: 20px auto; /* Center horizontal */
        }
        
        .video-preview {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: blur(0px) brightness(0.9);
            transition: filter 0.3s ease;
            /* Sembunyikan controls di tampilan awal */
            pointer-events: none;
        }
        
        .video-container:hover .video-preview {
            filter: blur(0px) brightness(1);
        }
        
        .play-button {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.7);
            border: 2px solid white;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
            transition: all 0.3s ease;
        }
        
        .play-button:hover {
            background: rgba(255,255,255,0.2);
            transform: translate(-50%, -50%) scale(1.1);
        }
        
        .play-button::after {
            content: "";
            display: block;
            width: 0;
            height: 0;
            border-top: 12px solid transparent;
            border-bottom: 12px solid transparent;
            border-left: 20px solid white;
            margin-left: 4px;
        }
        
        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 16px;
            z-index: 20;
            background: rgba(0,0,0,0.7);
            padding: 10px 20px;
            border-radius: 5px;
        }
        
        .hidden {
            display: none;
        }
        
        .video-title {
            position: absolute;
            bottom: 15px;
            left: 15px;
            color: white;
            font-size: 14px;
            background: rgba(0,0,0,0.5);
            padding: 6px 12px;
            border-radius: 4px;
            z-index: 15;
            max-width: 80%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        
        /* Mobile optimization */
        @media (max-width: 768px) {
            .video-container {
                margin: 10px auto;
                border-radius: 4px;
                max-width: 350px;
            }
            
            .play-button {
                width: 50px;
                height: 50px;
            }
            
            .play-button::after {
                border-top: 10px solid transparent;
                border-bottom: 10px solid transparent;
                border-left: 16px solid white;
                margin-left: 3px;
            }
            
            .video-title {
                font-size: 12px;
                bottom: 10px;
                left: 10px;
                padding: 4px 8px;
            }
            
            .loading {
                font-size: 14px;
                padding: 8px 16px;
            }
        }
        
        @media (max-width: 480px) {
            .video-container {
                max-width: 300px;
            }
            
            .play-button {
                width: 45px;
                height: 45px;
            }
            
            .play-button::after {
                border-top: 8px solid transparent;
                border-bottom: 8px solid transparent;
                border-left: 13px solid white;
                margin-left: 2px;
            }
            
            .video-title {
                font-size: 11px;
            }
        }
    </style>
</head>
<body>
    <div class="video-container">
        <!-- Video preview yang terlihat di tampilan awal -->
        <video class="video-preview" id="videoPreview" muted playsinline preload="metadata"></video>
        <div class="play-button" id="playButton"></div>
        <div class="loading hidden" id="loading">Loading video...</div>
        <div class="video-title" id="videoTitle">Loading...</div>
    </div>

    <script>
        // Ambil ID video dari parameter ?mov=ID.mp4
        function getVideoId() {
            const urlParams = new URLSearchParams(window.location.search);
            const movParam = urlParams.get('mov');
            if (movParam) {
                // Hapus .mp4 jika ada
                return movParam.replace('.mp4', '');
            }
            return 'CXdziPvQ1'; // default
        }
        
        const videoId = getVideoId();
        const VIDEO_URL = `https://cdn.slicedrive.com/${videoId}.mp4`;
        
        // Tampilkan preview video (video element sebagai preview)
        const videoPreview = document.getElementById('videoPreview');
        const videoTitle = document.getElementById('videoTitle');
        const playButton = document.getElementById('playButton');
        const loading = document.getElementById('loading');
        
        // Pastikan play button selalu terlihat
        playButton.style.display = 'flex';
        
        // Setup video preview
        videoPreview.muted = true;
        videoPreview.playsInline = true;
        videoPreview.preload = 'metadata';
        videoPreview.src = VIDEO_URL;
        
        // Tunggu video load
        videoPreview.addEventListener('loadeddata', () => {
            // Video sudah siap, sembunyikan loading
            loading.classList.add('hidden');
            videoTitle.textContent = `Video: ${videoId}`;
            
            // Jangan play otomatis - biarkan video paused di frame pertama
            // Hanya seek ke frame pertama untuk menampilkan thumbnail
            videoPreview.currentTime = 0.1; // Frame pertama
        });
        
        // Error handling
        videoPreview.addEventListener('error', () => {
            createPlaceholder();
            loading.classList.add('hidden');
        });
        
        // Timeout protection
        setTimeout(() => {
            if (videoPreview.readyState < 2) { // HAVE_CURRENT_DATA
                createPlaceholder();
            }
            loading.classList.add('hidden');
            playButton.style.display = 'flex';
        }, 5000);
        
        function createPlaceholder() {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = 450;
            canvas.height = 800;
            
            // Gradient background
            const gradient = ctx.createLinearGradient(0, 0, 0, 800);
            gradient.addColorStop(0, '#1a1a2e');
            gradient.addColorStop(0.5, '#16213e');
            gradient.addColorStop(1, '#0f3460');
            
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, 450, 800);
            
            // Teks
            ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
            ctx.font = 'bold 20px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('VIDEO PLAYER', 225, 350);
            ctx.font = '16px Arial';
            ctx.fillText(videoId, 225, 380);
            
            // Convert to image and use as video poster
            videoPreview.poster = canvas.toDataURL();
            playButton.style.display = 'flex';
        }
        
        // Set initial video title
        videoTitle.textContent = `Video: ${videoId}`;
        
        // Play button handler
        playButton.addEventListener('click', playVideo);
        
        function playVideo() {
            try {
                // Sembunyikan tombol play, tampilkan loading
                playButton.classList.add('hidden');
                loading.classList.remove('hidden');
                
                // Tunggu sebentar
                setTimeout(() => {
                    // Method: Redirect ke new tab alih-alih popup untuk kompatibilitas Facebook
                    const newWindow = window.open('', '_blank');
                    if (newWindow) {
                        const htmlContent = '<!DOCTYPE html>' +
                            '<html>' +
                            '<head>' +
                                '<title>Video Player</title>' +
                                '<meta name="viewport" content="width=device-width, initial-scale=1.0">' +
                                '<style>' +
                                    'body { ' +
                                        'margin: 0; ' +
                                        'background: #000;' +
                                        'display: flex;' +
                                        'flex-direction: column;' +
                                        'align-items: center;' +
                                        'min-height: 100vh;' +
                                        'overflow-x: hidden;' +
                                    '}' +
                                    '.ad-container { ' +
                                        'width: 100%;' +
                                        'max-width: 600px;' +
                                        'margin: 10px 0;' +
                                        'text-align: center;' +
                                        'background: #222;' +
                                        'padding: 10px;' +
                                    '}' +
                                    '.video-container { ' +
                                        'width: 100%;' +
                                        'max-width: 600px;' +
                                        'flex: 1;' +
                                        'display: flex;' +
                                        'justify-content: center;' +
                                        'align-items: center;' +
                                    '}' +
                                    'video { ' +
                                        'width: 100%;' +
                                        'height: auto;' +
                                        'max-height: 80vh;' +
                                        'object-fit: contain;' +
                                    '}' +
                                    '@media (max-width: 480px) {' +
                                        '.ad-container, .video-container { max-width: 100%; }' +
                                    '}' +
                                '</style>' +
                            '</head>' +
                            '<body>' +
                                '<div class="ad-container">' +
                                    '<!-- Top Ad Code -->' +
                                    '<script src="https://agingsurroundspecific.com/83/d9/43/83d9430730df5312d475f613817af347.js"></scr' + 'ipt>' +
                                    '<!-- Histats.com  START  (aync)-->' +
                                    '<sc' + 'ript type="text/javascript">var _Hasync= _Hasync|| [];' +
                                    '_Hasync.push([\'Histats.start\', \'1,4939965,4,0,0,0,00010000\']);' +
                                    '_Hasync.push([\'Histats.fasi\', \'1\']);' +
                                    '_Hasync.push([\'Histats.track_hits\', \'\']);' +
                                    '(function() {' +
                                    'var hs = document.createElement(\'sc' + 'ript\'); hs.type = \'text/javascript\'; hs.async = true;' +
                                    'hs.src = (\'//s10.histats.com/js15_as.js\');' +
                                    '(document.getElementsByTagName(\'head\')[0] || document.getElementsByTagName(\'body\')[0]).appendChild(hs);' +
                                    '})();</sc' + 'ript>' +
                                    '<noscript><a href="/" target="_blank"><img  src="//sstatic1.histats.com/0.gif?4939965&101" alt="" border="0"></a></noscript>' +
                                    '<!-- Histats.com  END  -->' +
                                '</div>' +
                                '<div class="video-container">' +
                                    '<video id="player" controls autoplay muted playsinline>' +
                                        '<source src="' + VIDEO_URL + '" type="video/mp4">' +
                                        'Your browser does not support the video tag.' +
                                    '</video>' +
                                '</div>' +
                                '<div class="ad-container">' +
                                    '<!-- Bottom Ad Code -->' +
                                '</div>' +
                                '<script>' +
                                    'const video = document.getElementById("player");' +
                                    '// Coba autoplay, jika gagal tampilkan pesan' +
                                    'video.play().catch(e => {' +
                                        'console.log("Autoplay blocked, user interaction required");' +
                                        '// Tampilkan pesan untuk user click play' +
                                        'video.addEventListener("click", function() {' +
                                            'video.play();' +
                                        '});' +
                                    '});' +
                                '</scr' + 'ipt>' +
                            '</body>' +
                            '</html>';
                        
                        newWindow.document.write(htmlContent);
                        newWindow.document.close();
                    } else {
                        // Fallback: Redirect ke new tab dengan URL
                        // Ini lebih kompatibel dengan Facebook browser
                        window.open(VIDEO_URL, '_blank');
                    }
                    
                    // Sembunyikan loading
                    loading.classList.add('hidden');
                    
                }, 300);
                
            } catch (error) {
                console.error('Error:', error);
                loading.textContent = 'Error loading video';
            }
        }
    </script>
</body>
</html>
